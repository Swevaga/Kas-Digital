<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#008A4B">
    <title>Kas Digital - Pencatat Keuangan</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <!-- Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <!-- ==============================
         # SPLASH SCREEN
         ============================== -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="spinner"></div>
            <h1 class="splash-title">Kas Digital</h1>
            <p class="splash-subtitle">By Evaga (Rouf)</p>
        </div>
    </div>

    <!-- ==============================
         # MAIN APP
         ============================== -->
    <div id="main-app" class="main-app" style="display: none;">
        <!-- Header -->
        <header class="app-header">
            <div class="header-top">
                <h1 class="app-name">Kas Digital</h1>
                <button id="btn-drive-sync" class="btn-icon" title="Sinkron Google Drive">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
                </button>
            </div>
            
            <!-- Balance Card -->
            <div class="balance-card">
                <div class="balance-info">
                    <p class="balance-label">Saldo Kamu</p>
                    <h2 class="balance-amount" id="balance">Rp 0</h2>
                </div>
                <div class="balance-stats">
                    <div class="stat-item income">
                        <small>Pemasukan</small>
                        <p id="total-income">Rp 0</p>
                    </div>
                    <div class="stat-item expense">
                        <small>Pengeluaran</small>
                        <p id="total-expense">Rp 0</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Quick Actions -->
        <nav class="quick-actions">
            <button id="btn-add-income" class="action-btn income">
                <div class="action-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                </div>
                <span>Tambah Pemasukan</span>
            </button>
            <button id="btn-add-expense" class="action-btn expense">
                <div class="action-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
                </div>
                <span>Tambah Pengeluaran</span>
            </button>
        </nav>

        <!-- Tabs -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="transactions">Transaksi</button>
        <button class="tab-btn" data-tab="spreadsheet">Spreadsheet</button>
        <button class="tab-btn" data-tab="report">Laporan</button>
    </div>

    <!-- Content -->
    <main class="app-content">
        <!-- Transactions Tab -->
        <section id="transactions-tab" class="tab-content active">
            <div class="transaction-list" id="transaction-list"></div>
            <p id="empty-state" class="empty-state" style="display: none;">Belum ada transaksi</p>
        </section>

        <!-- Spreadsheet Tab -->
        <section id="spreadsheet-tab" class="tab-content">
            <div class="spreadsheet-container" style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);">
                    <thead style="background: #008A4B;">
                        <tr>
                            <th style="padding: 12px 16px; text-align: left; color: white; font-weight: 600;">No</th>
                            <th style="padding: 12px 16px; text-align: left; color: white; font-weight: 600;">Tanggal</th>
                            <th style="padding: 12px 16px; text-align: left; color: white; font-weight: 600;">Keterangan</th>
                            <th style="padding: 12px 16px; text-align: left; color: white; font-weight: 600;">Tipe</th>
                            <th style="padding: 12px 16px; text-align: right; color: white; font-weight: 600;">Jumlah</th>
                        </tr>
                    </thead>
                    <tbody id="spreadsheet-body">
                    </tbody>
                    <tfoot style="background: #f3f4f6; font-weight: 600;">
                        <tr id="spreadsheet-summary">
                        </tr>
                    </tfoot>
                </table>
            </div>
        </section>

        <!-- Report Tab -->
        <section id="report-tab" class="tab-content">
            <div class="report-actions">
                <button id="btn-export-pdf" class="report-btn pdf">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Ekspor PDF
                </button>
                <button id="btn-export-excel" class="report-btn excel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Ekspor Excel
                </button>
                <button id="btn-export-json" class="report-btn json">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Backup JSON
                </button>
                <label class="report-btn json file-input-label">
                    <input type="file" id="import-json" accept=".json">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Restore JSON
                </label>
                <button id="btn-drive-sync2" class="report-btn drive">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
                    Sinkron Google Drive
                </button>
            </div>
        </section>
    </main>
    </div>

    <!-- ==============================
         # ADD TRANSACTION MODAL
         ============================== -->
    <div id="modal-add" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Tambah Transaksi</h2>
                <button id="btn-close-modal" class="btn-close">&times;</button>
            </div>
            <form id="transaction-form">
                <div class="form-group">
                    <label>Tipe Transaksi</label>
                    <div class="type-switch">
                        <input type="radio" id="type-income" name="type" value="income" checked>
                        <label for="type-income">Pemasukan</label>
                        <input type="radio" id="type-expense" name="type" value="expense">
                        <label for="type-expense">Pengeluaran</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="description">Keterangan</label>
                    <input type="text" id="description" required placeholder="Contoh: Gaji Bulanan">
                </div>
                <div class="form-group">
                    <label for="amount">Jumlah (Rp)</label>
                    <input type="number" id="amount" required placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label for="date">Tanggal</label>
                    <input type="date" id="date" required>
                </div>
                <button type="submit" class="btn-primary">Simpan Transaksi</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
